services:
  - type: web
    name: product-browsing-backend
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DATABASE_URL
        scope: build,runtime
      - key: API_KEY
        scope: build,runtime
      - key: ENVIRONMENT
        value: production
        scope: build,runtime
      - key: LOG_LEVEL
        value: INFO
        scope: build,runtime
    healthCheckPath: /health
    healthCheckInterval: 30
    maxShutdownDelay: 30

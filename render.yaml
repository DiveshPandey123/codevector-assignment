services:
  - type: web
    name: product-browsing-backend
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        scope: build,runtime
      - key: API_KEY
        scope: build,runtime
      - key: ENVIRONMENT
        value: production
        scope: build,runtime
      - key: LOG_LEVEL
        value: INFO
        scope: build,runtime
    healthCheckPath: /health
    healthCheckInterval: 30
    maxShutdownDelay: 30
